<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Global Marketing Team · Q1 2026 OKR Review</title>
<script src="https://cdn.jsdelivr.net/npm/ogl/dist/ogl.umd.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',-apple-system,sans-serif;background:#06090f;color:#dce3f0;-webkit-font-smoothing:antialiased;overflow-x:hidden}

  /* Noise texture overlay */
  body::before{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity:0.4;mix-blend-mode:overlay}

  /* Dot grid background */
  body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
    background-image:radial-gradient(circle,rgba(74,144,217,0.04) 1px,transparent 1px);
    background-size:40px 40px}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(74,144,217,0.15);border-radius:2px}
  .prism-container{position:relative;width:100%;height:100%}

  /* Editable */
  [contenteditable]{outline:none;cursor:text;border-radius:3px;transition:background 0.2s,box-shadow 0.2s}
  [contenteditable]:hover{background:rgba(74,144,217,0.05)}
  [contenteditable]:focus{background:rgba(74,144,217,0.08);box-shadow:inset 0 0 0 1px rgba(74,144,217,0.25)}

  /* ═══ All animations: compositor-only (transform + opacity) ═══ */

  /* Section reveal */
  .sec-anim{opacity:0;transform:translateY(36px);will-change:transform,opacity}
  section.vis .sec-anim{animation:revealUp 0.9s cubic-bezier(0.16,1,0.3,1) both}
  section.vis .sec-anim.d1{animation-delay:.06s}section.vis .sec-anim.d2{animation-delay:.12s}
  section.vis .sec-anim.d3{animation-delay:.18s}section.vis .sec-anim.d4{animation-delay:.24s}
  section.vis .sec-anim.d5{animation-delay:.3s}section.vis .sec-anim.d6{animation-delay:.36s}
  section.vis .sec-anim.d7{animation-delay:.42s}section.vis .sec-anim.d8{animation-delay:.48s}

  @keyframes revealUp{
    0%{opacity:0;transform:translateY(36px)}
    70%{opacity:1;transform:translateY(-3px)}
    100%{opacity:1;transform:translateY(0)}
  }

  /* KR card reveal */
  .kr-card{opacity:0;transform:translateY(20px);will-change:transform,opacity}
  section.vis .kr-card{animation:cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both}
  section.vis .kr-card:nth-child(1){animation-delay:.15s}
  section.vis .kr-card:nth-child(2){animation-delay:.25s}
  section.vis .kr-card:nth-child(3){animation-delay:.35s}

  @keyframes cardIn{
    0%{opacity:0;transform:translateY(20px)}
    60%{opacity:1;transform:translateY(-2px)}
    100%{opacity:1;transform:translateY(0)}
  }

  /* Expanded content */
  @keyframes expandReveal{
    0%{opacity:0;transform:translateY(-8px)}
    100%{opacity:1;transform:translateY(0)}
  }
  .kr-expanded{animation:expandReveal 0.45s cubic-bezier(0.16,1,0.3,1) both;overflow:hidden}

  /* Metric card pop */
  @keyframes metricPop{
    0%{opacity:0;transform:translateY(14px) scale(0.96)}
    65%{opacity:1;transform:translateY(-2px) scale(1.015)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }

  /* Shimmer text (title accent) */
  .shimmer-text{
    background:linear-gradient(90deg,#dce3f0 0%,#5BA3EC 25%,#dce3f0 50%,#5BA3EC 75%,#dce3f0 100%);
    background-size:200% 100%;
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmerMove 4s ease-in-out infinite;
  }
  @keyframes shimmerMove{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Glow card hover with shimmer */
  .glow-card{
    transition:border-color 0.4s cubic-bezier(0.16,1,0.3,1),box-shadow 0.4s cubic-bezier(0.16,1,0.3,1),transform 0.4s cubic-bezier(0.16,1,0.3,1);
    will-change:transform,box-shadow;position:relative;overflow:hidden
  }
  .glow-card::before{
    content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
    background:conic-gradient(from 0deg,transparent,rgba(74,144,217,0.06),transparent,rgba(74,144,217,0.04),transparent);
    opacity:0;transition:opacity 0.5s;pointer-events:none;z-index:0
  }
  .glow-card:hover::before{opacity:1;animation:cardShimmer 3s linear infinite}
  .glow-card:hover{
    border-color:rgba(74,144,217,0.2)!important;
    box-shadow:0 0 30px rgba(74,144,217,0.06),0 8px 30px rgba(0,0,0,0.4);
    transform:translateY(-3px)
  }
  .glow-card>*{position:relative;z-index:1}
  @keyframes cardShimmer{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  /* Animated gradient border (KPI hero cards) */
  .kpi-card{
    position:relative;overflow:hidden
  }
  .kpi-card::before{
    content:'';position:absolute;inset:-1px;border-radius:15px;padding:1px;
    background:linear-gradient(135deg,rgba(74,144,217,0.3),transparent 40%,transparent 60%,rgba(91,163,236,0.2));
    -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    animation:borderFlow 4s linear infinite;pointer-events:none;z-index:0
  }
  .kpi-card>*{position:relative;z-index:1}
  @keyframes borderFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

  /* Number glow pulse */
  .num-glow{
    text-shadow:0 0 20px rgba(91,163,236,0.3),0 0 40px rgba(91,163,236,0.1);
    animation:numPulse 3s ease-in-out infinite
  }
  @keyframes numPulse{0%,100%{text-shadow:0 0 20px rgba(91,163,236,0.3),0 0 40px rgba(91,163,236,0.1)}50%{text-shadow:0 0 30px rgba(91,163,236,0.5),0 0 60px rgba(91,163,236,0.2)}}

  /* Section title gradient text */
  .title-gradient{
    background:linear-gradient(135deg,#dce3f0 0%,#8baddb 50%,#dce3f0 100%);
    background-size:200% 100%;
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:titleShimmer 5s ease-in-out infinite
  }
  @keyframes titleShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Animated underline for section headers */
  .sec-underline{position:relative;display:inline-block}
  .sec-underline::after{
    content:'';position:absolute;bottom:-6px;left:50%;width:0;height:2px;
    background:linear-gradient(90deg,transparent,rgba(74,144,217,0.6),rgba(91,163,236,0.4),transparent);
    transition:width 0.8s cubic-bezier(0.16,1,0.3,1),left 0.8s cubic-bezier(0.16,1,0.3,1)
  }
  section.vis .sec-underline::after{width:100px;left:calc(50% - 50px)}

  /* Metric card animated accent bar */
  .metric-card{position:relative;overflow:hidden}
  .metric-card::after{
    content:'';position:absolute;top:0;left:0;width:0;height:2px;
    background:linear-gradient(90deg,rgba(74,144,217,0.5),rgba(91,163,236,0.3));
    transition:width 0.5s cubic-bezier(0.16,1,0.3,1)
  }
  .metric-card:hover::after{width:100%}

  /* Nav active pill animated border */
  .nav-pill.active{position:relative;overflow:hidden}
  .nav-pill.active::before{
    content:'';position:absolute;bottom:0;left:0;width:100%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(74,144,217,0.5),transparent);
    animation:navLine 2s ease-in-out infinite
  }
  @keyframes navLine{0%,100%{opacity:0.3;transform:scaleX(0.5)}50%{opacity:1;transform:scaleX(1)}}

  /* Gradient separator */
  .section-sep{height:1px;background:linear-gradient(90deg,transparent,rgba(74,144,217,0.25) 30%,rgba(74,144,217,0.4) 50%,rgba(74,144,217,0.25) 70%,transparent);margin:20px auto;max-width:500px}

  /* Animated underline for section headers */
  .sec-underline{
    position:relative;display:inline-block
  }
  .sec-underline::after{
    content:'';position:absolute;bottom:-4px;left:50%;width:0;height:2px;
    background:linear-gradient(90deg,transparent,rgba(74,144,217,0.6),transparent);
    transition:width 0.6s cubic-bezier(0.16,1,0.3,1),left 0.6s cubic-bezier(0.16,1,0.3,1)
  }
  section.vis .sec-underline::after{width:80px;left:calc(50% - 40px)}

  /* Nav */
  .top-nav{
    position:sticky;top:0;z-index:200;
    background:rgba(6,9,15,0.75);
    backdrop-filter:blur(24px) saturate(1.2);
    -webkit-backdrop-filter:blur(24px) saturate(1.2);
    border-bottom:1px solid transparent;
    transition:background 0.4s,border-color 0.4s,box-shadow 0.4s
  }
  .top-nav.scrolled{
    background:rgba(6,9,15,0.95);
    border-bottom-color:rgba(74,144,217,0.1);
    box-shadow:0 4px 30px rgba(0,0,0,0.4)
  }

  /* Nav pill */
  .nav-pill{
    padding:7px 14px;border-radius:20px;font-size:12px;
    text-decoration:none;cursor:pointer;font-family:'Inter',sans-serif;
    border:1px solid transparent;
    transition:all 0.3s cubic-bezier(0.16,1,0.3,1)
  }
  .nav-pill:hover{background:rgba(74,144,217,0.06)!important}
  .nav-pill.active{
    color:#fff;background:rgba(74,144,217,0.15);
    border-color:rgba(74,144,217,0.3);
    box-shadow:0 0 16px rgba(74,144,217,0.08);
    animation:glowPulse 3s ease-in-out infinite
  }
  .nav-pill:not(.active){color:rgba(255,255,255,0.35)}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(74,144,217,0)}50%{box-shadow:0 0 16px 2px rgba(74,144,217,0.12)}}

  /* Chevron */
  .chevron{
    display:inline-flex;align-items:center;justify-content:center;
    width:30px;height:30px;border-radius:8px;
    background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
    transition:transform 0.4s cubic-bezier(0.16,1,0.3,1),background 0.25s,box-shadow 0.3s;
    flex-shrink:0
  }
  .chevron:hover{background:rgba(74,144,217,0.08);box-shadow:0 0 10px rgba(74,144,217,0.1)}
  .chevron.open{transform:rotate(180deg)}
  .chevron svg{width:14px;height:14px;stroke:rgba(255,255,255,0.4);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Hero KPI cards */
  .kpi-card{
    padding:18px 22px;border-radius:14px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    backdrop-filter:blur(8px);
    transition:border-color 0.3s,box-shadow 0.3s,transform 0.3s cubic-bezier(0.16,1,0.3,1)
  }
  .kpi-card:hover{
    border-color:rgba(74,144,217,0.2);
    box-shadow:0 0 20px rgba(74,144,217,0.1);
    transform:translateY(-3px)
  }

  /* Metric card */
  .metric-card{
    background:#0e1320;border-radius:10px;padding:16px;
    transition:border-color 0.35s,box-shadow 0.35s,transform 0.35s cubic-bezier(0.16,1,0.3,1)
  }
  .metric-card:hover{
    border-color:rgba(74,144,217,0.25)!important;
    box-shadow:0 0 16px rgba(74,144,217,0.06);
    transform:translateY(-2px)
  }

  /* Keyframes */
  @keyframes heroTextIn{0%{opacity:0;transform:translateY(35px) scale(0.96)}100%{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
  @keyframes fadeUp{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes scrollDot{0%{transform:translateY(0);opacity:1}100%{transform:translateY(8px);opacity:0}}

  /* StarBorder animated border */
  .star-border-container{display:inline-block;position:relative;border-radius:16px;overflow:hidden}
  .border-gradient-bottom{position:absolute;width:300%;height:50%;opacity:0.7;bottom:-12px;right:-250%;border-radius:50%;animation:star-movement-bottom linear infinite alternate;z-index:0}
  .border-gradient-top{position:absolute;opacity:0.7;width:300%;height:50%;top:-12px;left:-250%;border-radius:50%;animation:star-movement-top linear infinite alternate;z-index:0}
  .inner-content{position:relative;border:1px solid rgba(74,144,217,0.15);background:rgba(8,12,20,0.98);color:#dce3f0;font-size:16px;text-align:center;padding:0;border-radius:16px;z-index:1}
  @keyframes star-movement-bottom{0%{transform:translate(0%,0%);opacity:1}100%{transform:translate(-100%,0%);opacity:0}}
  @keyframes star-movement-top{0%{transform:translate(0%,0%);opacity:1}100%{transform:translate(100%,0%);opacity:0}}

  /* Login input */
  .login-input{width:100%;padding:13px 18px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#dce3f0;font-size:14px;outline:none;font-family:'Inter',sans-serif;box-sizing:border-box;transition:border-color 0.3s,box-shadow 0.3s}
  .login-input:focus{border-color:rgba(74,144,217,0.35);box-shadow:0 0 12px rgba(74,144,217,0.08)}
  .login-input::placeholder{color:rgba(255,255,255,0.2)}
  .login-input.error{border-color:rgba(248,113,113,0.4);box-shadow:0 0 12px rgba(248,113,113,0.08)}

  /* Save bar */
  .save-bar{position:fixed;bottom:28px;right:28px;z-index:300;display:flex;gap:8px}
  .save-bar button{
    padding:10px 20px;border-radius:24px;
    border:1px solid rgba(74,144,217,0.25);background:rgba(12,18,30,0.92);
    backdrop-filter:blur(16px);color:#dce3f0;font-size:12px;font-weight:600;
    cursor:pointer;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
    font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px
  }
  .save-bar button:hover{background:rgba(74,144,217,0.15);border-color:rgba(74,144,217,0.4);transform:translateY(-2px);box-shadow:0 4px 16px rgba(74,144,217,0.1)}
  .save-bar button.done{border-color:rgba(52,211,153,0.35);color:#34d399}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ═══ Prism (play once then freeze — zero continuous rendering) ═══
function Prism({height=3.5,baseWidth=5.5,animationType='rotate',glow=1,offset={x:0,y:0},noise=0.5,transparent=true,scale=3.6,hueShift=0,colorFrequency=1,hoverStrength=2,inertia=0.05,bloom=1,timeScale=0.5,playDuration=6}){
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current;if(!c||typeof ogl==='undefined')return;
    const{Renderer,Triangle,Program,Mesh}=ogl;
    const H=Math.max(.001,height),BW=Math.max(.001,baseWidth),BH=BW*.5,G=Math.max(0,glow),N=Math.max(0,noise),ox=offset?.x??0,oy=offset?.y??0;
    const SAT=transparent?1.5:1,SC=Math.max(.001,scale),HU=hueShift||0,CF=Math.max(0,colorFrequency||1),BL=Math.max(0,bloom||1),TS=Math.max(0,timeScale||1);
    const dpr=Math.min(1.5,window.devicePixelRatio||1);
    const r=new Renderer({dpr,alpha:transparent,antialias:false});const gl=r.gl;gl.disable(gl.DEPTH_TEST);gl.disable(gl.CULL_FACE);gl.disable(gl.BLEND);
    Object.assign(gl.canvas.style,{position:'absolute',inset:'0',width:'100%',height:'100%',display:'block'});c.appendChild(gl.canvas);
    const vt=`attribute vec2 position;void main(){gl_Position=vec4(position,0.0,1.0);}`;
    const fg=`precision highp float;uniform vec2 iResolution;uniform float iTime,uHeight,uBaseHalf,uGlow,uNoise,uSaturation,uScale,uHueShift,uColorFreq,uBloom,uCenterShift,uInvBaseHalf,uInvHeight,uMinAxis,uPxScale,uTimeScale;uniform vec2 uOffsetPx;uniform mat3 uRot;uniform int uUseBaseWobble;
    vec4 t4(vec4 x){vec4 e=exp(2.0*x);return(e-1.0)/(e+1.0);}float rnd(vec2 co){return fract(sin(dot(co,vec2(12.9898,78.233)))*43758.5453);}
    float sdO(vec3 p){vec3 q=vec3(abs(p.x)*uInvBaseHalf,abs(p.y)*uInvHeight,abs(p.z)*uInvBaseHalf);return(q.x+q.y+q.z-1.0)*uMinAxis*0.577;}
    float sdP(vec3 p){return max(sdO(p),-p.y);}
    mat3 hR(float a){float c=cos(a),s=sin(a);mat3 W=mat3(.299,.587,.114,.299,.587,.114,.299,.587,.114);mat3 U=mat3(.701,-.587,-.114,-.299,.413,-.114,-.3,-.588,.886);mat3 V=mat3(.168,-.331,.5,.328,.035,-.5,-.497,.296,.201);return W+U*c+V*s;}
    void main(){vec2 f=(gl_FragCoord.xy-0.5*iResolution.xy-uOffsetPx)*uPxScale;float z=5.0,d=0.0;vec3 p;vec4 o=vec4(0.0);mat2 w=mat2(1.0);if(uUseBaseWobble==1){float t=iTime*uTimeScale;w=mat2(cos(t),cos(t+33.0),cos(t+11.0),cos(t));}for(int i=0;i<60;i++){p=vec3(f,z);p.xz=p.xz*w;p=uRot*p;vec3 q=p;q.y+=uCenterShift;d=0.1+0.2*abs(sdP(q));z-=d;o+=(sin((p.y+z)*uColorFreq+vec4(0,1,2,3))+1.0)/d;}o=t4(o*o*(uGlow*uBloom)/1e5);vec3 col=o.rgb;col+=(rnd(gl_FragCoord.xy+vec2(iTime))-0.5)*uNoise;col=clamp(col,0.0,1.0);float L=dot(col,vec3(.2126,.7152,.0722));col=clamp(mix(vec3(L),col,uSaturation),0.0,1.0);if(abs(uHueShift)>.0001)col=clamp(hR(uHueShift)*col,0.0,1.0);gl_FragColor=vec4(col,o.a);}`;
    const geo=new Triangle(gl),iR=new Float32Array(2),oP=new Float32Array(2);
    const prog=new Program(gl,{vertex:vt,fragment:fg,uniforms:{iResolution:{value:iR},iTime:{value:0},uHeight:{value:H},uBaseHalf:{value:BH},uUseBaseWobble:{value:1},uRot:{value:new Float32Array([1,0,0,0,1,0,0,0,1])},uGlow:{value:G},uOffsetPx:{value:oP},uNoise:{value:N},uSaturation:{value:SAT},uScale:{value:SC},uHueShift:{value:HU},uColorFreq:{value:CF},uBloom:{value:BL},uCenterShift:{value:H*.25},uInvBaseHalf:{value:1/BH},uInvHeight:{value:1/H},uMinAxis:{value:Math.min(BH,H)},uPxScale:{value:1/((gl.drawingBufferHeight||1)*.1*SC)},uTimeScale:{value:TS}}});
    const mesh=new Mesh(gl,{geometry:geo,program:prog});
    const resize=()=>{const w=c.clientWidth||1,h=c.clientHeight||1;r.setSize(w,h);iR[0]=gl.drawingBufferWidth;iR[1]=gl.drawingBufferHeight;oP[0]=ox*dpr;oP[1]=oy*dpr;prog.uniforms.uPxScale.value=1/((gl.drawingBufferHeight||1)*.1*SC);};
    const ro=new ResizeObserver(resize);ro.observe(c);resize();
    const rB=new Float32Array(9);const sM=(y,p,rl,o)=>{const cy=Math.cos(y),sy=Math.sin(y),cx=Math.cos(p),sx=Math.sin(p),cz=Math.cos(rl),sz=Math.sin(rl);o[0]=cy*cz+sy*sx*sz;o[1]=cx*sz;o[2]=-sy*cz+cy*sx*sz;o[3]=-cy*sz+sy*sx*cz;o[4]=cx*cz;o[5]=sy*sz+cy*sx*cz;o[6]=sy*cx;o[7]=-sx;o[8]=cy*cx;return o;};
    let raf=0,t0=performance.now(),done=false;
    const R=Math.random;const wX=.3+R()*.6,wY=.2+R()*.7,wZ=.1+R()*.5,phX=R()*Math.PI*2,phZ=R()*Math.PI*2;

    const draw=t=>{
      if(done)return;
      const tm=(t-t0)*.001;
      prog.uniforms.iTime.value=tm;
      if(animationType==='3drotate'){const ts=tm*TS;const yaw=ts*wY,pitch=Math.sin(ts*wX+phX)*.6,roll=Math.sin(ts*wZ+phZ)*.5;sM(yaw,pitch,roll,rB);prog.uniforms.uRot.value=rB;}
      else{rB[0]=1;rB[1]=0;rB[2]=0;rB[3]=0;rB[4]=1;rB[5]=0;rB[6]=0;rB[7]=0;rB[8]=1;prog.uniforms.uRot.value=rB;}
      r.render({scene:mesh});
      // Freeze after playDuration — render final frame then stop
      if(tm<playDuration)raf=requestAnimationFrame(draw);
      else{done=true;raf=0;}
    };
    raf=requestAnimationFrame(draw);
    ro.observe(c);
    return()=>{if(raf)cancelAnimationFrame(raf);ro.disconnect();if(gl.canvas.parentElement===c)c.removeChild(gl.canvas);};
  },[]);
  return <div className="prism-container" ref={ref}/>;

// ═══ Save Bar ═══
function SaveBar(){
  const[s,setS]=useState('idle');
  const save=()=>{localStorage.setItem('okr-save',document.documentElement.outerHTML);setS('saved');setTimeout(()=>setS('idle'),2000);};
  const dl=()=>{const b=new Blob([document.documentElement.outerHTML],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Q1 OKR Review.html';a.click();URL.revokeObjectURL(a.href);setS('dl');setTimeout(()=>setS('idle'),2000);};
  return <div className="save-bar"><button onClick={save} className={s==='saved'?'done':''}>{s==='saved'?'✓ Saved':'💾 Save'}</button><button onClick={dl} className={s==='dl'?'done':''}>{s==='dl'?'✓ Downloaded':'⬇ Download'}</button></div>;
}

function TopNav({active}){

  useEffect(()=>{
    const nav=navRef.current;if(!nav)return;let ticking=false;
    const fn=()=>{if(!ticking){requestAnimationFrame(()=>{nav.classList.toggle('scrolled',window.scrollY>window.innerHeight*.7);ticking=false;});ticking=true;}};
    window.addEventListener('scroll',fn,{passive:true});return()=>window.removeEventListener('scroll',fn);
  },[]);
  const items=[{id:'o1',label:'O1',full:'品牌'},{id:'o2',label:'O2',full:'增长'},{id:'o3',label:'O3',full:'SEO'},{id:'o4',label:'O4',full:'突破'},{id:'strategy',label:'战略',full:''},{id:'areas',label:'Q2',full:'改进'}];

        </a>
        <div style={{display:'flex',gap:3}}>
          {items.map(it=><a key={it.id} href={`#${it.id}`} onClick={e=>{e.preventDefault();document.getElementById(it.id)?.scrollIntoView({behavior:'smooth'});}} className={`nav-pill${active===it.id?' active':''}`}>{it.label}{it.full&&<span style={{fontSize:9,opacity:0.4,fontFamily:T.font.en,marginLeft:4}}>{it.full}</span>}</a>)}

// ═══ Login Overlay ═══
function LoginOverlay({onLogin}){
  const [user,setUser]=useState('');
  const [pass,setPass]=useState('');
  const [error,setError]=useState(false);
  const [shaking,setShaking]=useState(false);
  const passRef=useRef(null);

  const submit=()=>{
    if(user==='vantage'&&pass==='vantage'){
      sessionStorage.setItem('vantage-auth','ok');
      onLogin();
    } else {
      setError(true);setShaking(true);
      setTimeout(()=>setError(false),3000);
      setTimeout(()=>setShaking(false),500);
    }
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:99999,background:'#06090f',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Inter,sans-serif'}}>
      {/* Animated background dots */}
      <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(circle,rgba(74,144,217,0.04) 1px,transparent 1px)',backgroundSize:'40px 40px'}}/>

      <StarBorder color="rgba(74,144,217,0.6)" speed="4s" thickness={2}
        style={{animation:'heroTextIn 0.8s cubic-bezier(0.16,1,0.3,1) both',transform:shaking?'translateX(-8px)':'none',transition:'transform 0.1s'}}>
        <div style={{padding:'48px 44px',width:380}}>
          {/* Logo */}
          <div style={{textAlign:'center',marginBottom:36}}>
            <div className="shimmer-text" style={{fontSize:32,fontWeight:800,letterSpacing:'0.1em',fontFamily:'Inter,sans-serif',marginBottom:10}}>VANTAGE</div>
            <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,rgba(74,144,217,0.5),transparent)',margin:'0 auto 14px'}}/>
            <div style={{fontSize:10,color:'rgba(74,144,217,0.4)',letterSpacing:'0.25em',fontFamily:'Inter,sans-serif'}}>Q1 2026 OKR REVIEW</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,0.2)',letterSpacing:'0.15em',fontFamily:'Inter,sans-serif',marginTop:4}}>AUTHORIZED ACCESS ONLY</div>
          </div>

          {/* Error */}
          <div style={{fontSize:12,color:'#f87171',marginBottom:12,textAlign:'center',opacity:error?1:0,transition:'opacity 0.3s',height:error?20:0,overflow:'hidden'}}>
            Invalid credentials. Please try again.
          </div>

          {/* Inputs */}
          <input className={`login-input${error?' error':''}`} type="text" placeholder="Username" value={user}
            onChange={e=>setUser(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')passRef.current?.focus();}}
            style={{marginBottom:12}}/>
          <input ref={passRef} className={`login-input${error?' error':''}`} type="password" placeholder="Password" value={pass}
            onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')submit();}}
            style={{marginBottom:24}}/>

          {/* Submit button */}
          <button onClick={submit}
            style={{width:'100%',padding:'14px',borderRadius:10,border:'1px solid rgba(74,144,217,0.2)',background:'linear-gradient(135deg,rgba(27,54,93,0.8),rgba(45,90,142,0.6))',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',transition:'all 0.3s cubic-bezier(0.16,1,0.3,1)',fontFamily:'Inter,sans-serif',letterSpacing:'0.05em'}}
            onMouseEnter={e=>{e.currentTarget.style.background='linear-gradient(135deg,rgba(45,90,142,0.9),rgba(74,144,217,0.7))';e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 4px 20px rgba(74,144,217,0.15)';}}
            onMouseLeave={e=>{e.currentTarget.style.background='linear-gradient(135deg,rgba(27,54,93,0.8),rgba(45,90,142,0.6))';e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='none';}}>
            Sign In
          </button>

          {/* Hint */}
          <div style={{fontSize:10,color:'rgba(255,255,255,0.12)',textAlign:'center',marginTop:20,letterSpacing:'0.05em'}}>
            Contact admin for access credentials
          </div>
        </div>
      </StarBorder>
    </div>
  );
}

    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');setActiveSection(e.target.id);}});},{rootMargin:'-5% 0px -50% 0px',threshold:0.03});

            <div className="sec-anim" style={{padding:'80px 0 36px',textAlign:'center'}}>
              <div style={{display:'inline-flex',alignItems:'center',gap:12,marginBottom:14}}>
                <div style={{width:40,height:1,background:T.border}}/>
                <span style={{fontSize:11,fontWeight:800,padding:'5px 18px',borderRadius:20,background:`${obj.statusColor}15`,color:obj.statusColor,fontFamily:T.font.mono,letterSpacing:'0.06em'}}>{obj.id.toUpperCase()}</span>
                <div style={{width:40,height:1,background:T.border}}/>
              </div>
              <h2 className="sec-underline title-gradient" style={{fontSize:32,fontWeight:900,fontFamily:T.font.cn,marginBottom:5}}><Ed>{obj.title}</Ed></h2>
              <p style={{fontSize:13,color:T.textSec,fontFamily:T.font.en,marginBottom:10}}><Ed>{obj.titleEn}</Ed></p>
              <p style={{fontSize:14,color:T.textBody,fontFamily:T.font.cn}}><Ed>{obj.subtitle}</Ed></p>
              <p style={{fontSize:12,color:T.textSec,fontFamily:T.font.en,marginTop:2}}><Ed>{obj.subtitleEn}</Ed></p>
              <div style={{marginTop:12}}><span style={{fontSize:11,fontWeight:600,color:obj.statusColor,fontFamily:T.font.en}}>{obj.statusEn}</span></div>
            </div>
            {obj.krs.map(kr=><KRCard key={kr.id} kr={kr} expanded={expandedKR===kr.id} onToggle={()=>toggleKR(kr.id)}/>)}
          </section>
        ))}
        <div className="section-sep"/>

        <section id="strategy">
          <div className="sec-anim" style={{padding:'80px 0 36px',textAlign:'center'}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:12,marginBottom:14}}>
              <div style={{width:40,height:1,background:T.border}}/><span style={{fontSize:11,fontWeight:800,padding:'5px 18px',borderRadius:20,background:`${T.accent}15`,color:T.accent,fontFamily:T.font.mono}}>STRATEGY</span><div style={{width:40,height:1,background:T.border}}/>
            </div>
            <h2 className="sec-underline title-gradient" style={{fontSize:32,fontWeight:900,fontFamily:T.font.cn,marginBottom:5}}><Ed>{DATA.strategy.title}</Ed></h2>
            <p style={{fontSize:13,color:T.textSec,fontFamily:T.font.en}}><Ed>{DATA.strategy.titleEn}</Ed></p>
            <div style={{marginTop:16}}><span style={{fontSize:20,color:T.accentLight,fontWeight:600,fontFamily:T.font.cn}}><Ed>{DATA.strategy.core}</Ed></span><br/><span style={{fontSize:13,color:T.textSec,fontFamily:T.font.en}}><Ed>{DATA.strategy.coreEn}</Ed></span></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20,marginBottom:36}}>
            {DATA.strategy.pillars.map((p,i)=>(
              <div key={i} className={`sec-anim d${i+1} glow-card`} style={{background:T.bgCard,borderRadius:T.r.lg,padding:'26px 22px',border:`1px solid ${T.border}`}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}><Icon name={p.icon} size={24} color={p.color} glow/><div style={{width:32,height:3,borderRadius:2,background:p.color}}/></div>
                <h3 style={{fontSize:15,fontWeight:700,color:T.text,fontFamily:T.font.cn,marginBottom:2}}><Ed>{p.title}</Ed></h3>
                <div style={{fontSize:11,color:T.textSec,fontFamily:T.font.en,marginBottom:14}}><Ed>{p.titleEn}</Ed></div>
                {p.items.map((item,j)=>(<div key={j} style={{padding:'8px 0',borderBottom:j<p.items.length-1?`1px solid ${T.borderLight}`:'none'}}><div style={{fontSize:13,color:T.textBody,fontFamily:T.font.cn}}><Ed>{item}</Ed></div><div style={{fontSize:10.5,color:T.textSec,fontFamily:T.font.en,marginTop:1}}><Ed>{p.itemsEn[j]}</Ed></div></div>))}
              </div>
            ))}
          </div>
          <div className="sec-anim d4" style={{fontSize:10,fontWeight:700,color:T.textSec,letterSpacing:'0.12em',marginBottom:16,fontFamily:T.font.en}}>REGIONAL EXPANSION</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
            {DATA.strategy.execution.map((ex,i)=>(
              <div key={i} className={`sec-anim d${i+5} glow-card`} style={{background:T.bgCard,borderRadius:T.r.lg,padding:'22px',border:`1px solid ${T.border}`}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                  <Icon name={ex.icon} size={24} color={ex.color||T.accentLight} glow/>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:T.text,fontFamily:T.font.cn}}><Ed>{ex.title}</Ed></div>
                    <div style={{fontSize:10,color:T.textSec,fontFamily:T.font.en}}><Ed>{ex.titleEn}</Ed></div>
                  </div>
                </div>
                {(ex.items||[]).map((item,j)=>(
                  <div key={j} style={{fontSize:12,color:T.textBody,fontFamily:T.font.cn,padding:'5px 0',borderTop:j>0?`1px solid ${T.borderLight}`:'none'}}>
                    <Ed>{item}</Ed>
                    <div style={{fontSize:10,color:T.textMuted,fontFamily:T.font.en,marginTop:1}}><Ed>{(ex.itemsEn||[])[j]}</Ed></div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </section>

        <section id="areas">
          <div className="sec-anim" style={{padding:'80px 0 36px',textAlign:'center'}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:12,marginBottom:14}}>
              <div style={{width:40,height:1,background:T.border}}/><span style={{fontSize:11,fontWeight:800,padding:'5px 18px',borderRadius:20,background:`${T.amber}15`,color:T.amber,fontFamily:T.font.mono}}>Q2</span><div style={{width:40,height:1,background:T.border}}/>
            </div>
            <h2 className="sec-underline title-gradient" style={{fontSize:32,fontWeight:900,fontFamily:T.font.cn,marginBottom:5}}><Ed>{DATA.areas.title}</Ed></h2>
            <p style={{fontSize:13,color:T.textSec,fontFamily:T.font.en}}><Ed>{DATA.areas.titleEn}</Ed></p>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:12,maxWidth:720,margin:'0 auto'}}>
            {DATA.areas.items.map((item,i)=>(
              <div key={i} className={`sec-anim d${i+1} glow-card`} style={{display:'flex',alignItems:'flex-start',gap:14,background:T.bgCard,borderRadius:T.r.md,padding:'18px 22px',border:`1px solid ${T.border}`}}>
                <div style={{width:26,height:26,borderRadius:7,flexShrink:0,background:T.accentSoft,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:T.accentLight,fontFamily:T.font.mono}}>{i+1}</div>
                <div><div style={{fontSize:14,color:T.textBody,lineHeight:1.6,fontFamily:T.font.cn}}><Ed>{item.cn}</Ed></div><div style={{fontSize:12,color:T.textSec,fontFamily:T.font.en,marginTop:2}}><Ed>{item.en}</Ed></div></div>
              </div>
            ))}
          </div>
        </section>

        <div style={{textAlign:'center',padding:'80px 0 20px',borderTop:`1px solid ${T.border}`,marginTop:80}}>
          <div style={{fontSize:10,color:T.textMuted,fontFamily:T.font.en}}>{DATA.date} · Global Marketing Team · Confidential · Internal Use Only</div>
        </div>
      </main>
      <SaveBar/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
